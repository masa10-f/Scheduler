name: Type Checking

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [mypy, pyright]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.10 --group dev

      - run: uv run --no-sync ${{ matrix.tool }}
