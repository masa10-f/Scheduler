name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, such as v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.23"
          enable-cache: true

      - run: uv build

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/humancompiler-scheduler
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract release notes from changelog
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_TAG"].removeprefix("refs/tags/").removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*?\n(?P<body>.*?)(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          if match is None:
              raise SystemExit(f"CHANGELOG.md has no release notes for {version}")
          body = match.group("body").strip()
          if not body:
              raise SystemExit(f"CHANGELOG.md release notes for {version} are empty")
          Path("RELEASE_NOTES.md").write_text(body + "\n", encoding="utf-8")
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md
