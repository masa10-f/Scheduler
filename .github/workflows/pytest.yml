name: pytest

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  standard:
    name: "Python ${{ matrix.python }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.23"
          enable-cache: true

      - run: uv sync --locked --python ${{ matrix.python }} --group dev

      - run: uv run --no-sync pytest -m "not cp_sat"

  cp-sat:
    name: "CP-SAT / Python 3.12 / ubuntu-latest"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.23"
          enable-cache: true

      - run: uv sync --locked --python 3.12 --group dev --extra cp-sat

      - run: uv run --no-sync pytest -m cp_sat
